name = "health-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 bucket binding
[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "health-tracker-data"

# Environment variables
[vars]
AUTH_PIN = "1234"

# Uncomment and configure for production
# [env.production]
# name = "health-sync-production"
# vars = { AUTH_PIN = "your-secure-pin" }
